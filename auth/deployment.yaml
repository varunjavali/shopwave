apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: shopwave
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: 768571909004.dkr.ecr.ap-south-1.amazonaws.com/shopwave-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/shopwave"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"