apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 768571909004.dkr.ecr.ap-south-1.amazonaws.com/shopwave-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"