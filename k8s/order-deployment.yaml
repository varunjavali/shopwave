apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: shopwave
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
      - name: order
        image: nginx
        ports:
        - containerPort: 80